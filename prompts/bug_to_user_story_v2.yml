  techniques_applied:
    - "Role Prompting: Persona de Product Manager Sênior com Scrum Master certificado"
    - "Few-shot Learning: 3 exemplos completos com inventário explícito de dados (simples/médio/complexo)"
    - "Chain of Thought (CoT): 4 passos — inventário PRIMEIRO, depois classificação, escrita e checklist FINAL"
    - "Skeleton of Thought: 3 templates obrigatórios com bloco de erro explícito em cada complexidade"
    - "Self-Consistency Check: Checklist de 8 itens obrigatório no Passo 4 antes de entregar"
  optimization_notes: >
    Principais melhorias sobre o prompt anterior:
    (1) PASSO 1 é um INVENTÁRIO DE DADOS explícito feito ANTES de escrever qualquer linha —
        garante que nenhum número, endpoint, log ou impacto de negócio seja esquecido;
    (2) PASSO 4 é um CHECKLIST DE SAÍDA com 8 itens verificáveis — auto-revisão obrigatória
        antes de entregar;
    (3) Bloco de ERRO (Dado/Quando/Então separado) está EXPLICITAMENTE no template de cada
        complexidade, não apenas nas regras gerais;
    (4) Template de Contexto Técnico tem 5 campos nomeados obrigatórios: problema identificado,
        estado atual, estado esperado, impacto observado, sugestão técnica;
    (5) Exemplos few-shot incluem o INVENTÁRIO explícito para demonstrar o Passo 1 na prática.